# PONTE: isto substitui o combo web.xml + standalone.xml + system properties.
# Toda a configuração externalizável vive aqui (ou em variáveis de ambiente,
# que SOBRESCREVEM estas chaves: spring.datasource.url vira SPRING_DATASOURCE_URL).

spring:
  application:
    name: dyelab

# ==================== SEMANA 2: descomente e ajuste ====================
# No WildFly o datasource fica no standalone.xml e você faz lookup por JNDI.
# Aqui a aplicação é dona da conexão — declare e o pool (HikariCP) vem junto.
#
#  datasource:
#    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
#    username: dyelab
#    password: troque-me
#    driver-class-name: oracle.jdbc.OracleDriver
#  jpa:
#    hibernate:
#      ddl-auto: validate   # você tem DBA na veia: nunca "update" — versione DDL na mão
#    show-sql: true
#    properties:
#      hibernate:
#        format_sql: true
# ========================================================================

server:
  port: 8080

# ==================== SEMANA 4: profiles ====================
# Crie application-dev.yml e application-prod.yml e ative com:
#   --spring.profiles.active=dev
# (análogo a ter standalone.xml diferente por ambiente, só que versionado)
# =============================================================
